services:
  app-lb:
    image: nginx:alpine
    ports:
      - "3000:3000"
      - "3001:3001"
      - "8080:8080"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      web-2:
        condition: service_healthy
      api:
        condition: service_healthy
      api-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/nginx-status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
    environment:
      - NODE_ENV=production
      - API_URL=http://api:3001
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  web-2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
    environment:
      - NODE_ENV=production
      - API_URL=http://api:3001
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db-primary:5432/groundzero
      - DATABASE_REPLICA_URL=postgresql://postgres:postgres@db-read-lb:5432/groundzero
      - MINIO_ENDPOINT=http://minio-lb:9000
      - MINIO_PUBLIC_URL=http://localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=ground-zero
      - REDIS_URL=redis://redis-lb:6379
      - SESSION_SECRET=change-me-in-production
      - CORS_ORIGIN=http://localhost:3000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      db-primary:
        condition: service_healthy
      db-read-lb:
        condition: service_healthy
      minio-lb:
        condition: service_healthy
      redis-lb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/hello || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db-primary:5432/groundzero
      - DATABASE_REPLICA_URL=postgresql://postgres:postgres@db-read-lb:5432/groundzero
      - MINIO_ENDPOINT=http://minio-lb:9000
      - MINIO_PUBLIC_URL=http://localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=ground-zero
      - REDIS_URL=redis://redis-lb:6379
      - SESSION_SECRET=change-me-in-production
      - CORS_ORIGIN=http://localhost:3000
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      db-primary:
        condition: service_healthy
      db-read-lb:
        condition: service_healthy
      minio-lb:
        condition: service_healthy
      redis-lb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/hello || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis-primary:
    image: redis:7-alpine
    volumes:
      - redis_primary_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis-replica:
    image: redis:7-alpine
    command: redis-server --replicaof redis-primary 6379
    volumes:
      - redis_replica_data:/data
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis-sentinel-1:
    image: redis:7-alpine
    volumes:
      - ./docker/redis-sentinel/sentinel.conf:/etc/sentinel-template.conf:ro
      - ./docker/redis-sentinel/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["sh", "/entrypoint.sh"]
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    restart: unless-stopped

  redis-sentinel-2:
    image: redis:7-alpine
    volumes:
      - ./docker/redis-sentinel/sentinel.conf:/etc/sentinel-template.conf:ro
      - ./docker/redis-sentinel/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["sh", "/entrypoint.sh"]
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    restart: unless-stopped

  redis-sentinel-3:
    image: redis:7-alpine
    volumes:
      - ./docker/redis-sentinel/sentinel.conf:/etc/sentinel-template.conf:ro
      - ./docker/redis-sentinel/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["sh", "/entrypoint.sh"]
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    restart: unless-stopped

  redis-lb:
    image: haproxy:3.0-alpine
    ports:
      - "6379:6379"
      - "8405:8405"
    volumes:
      - ./docker/haproxy-redis/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_started
      redis-sentinel-2:
        condition: service_started
      redis-sentinel-3:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6379"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db-primary:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: groundzero
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=5
      -c wal_keep_size=64MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./docker/postgres-primary/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db-secondary:
    image: postgres:17-alpine
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: db-primary
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
    entrypoint: ["bash", "/entrypoint.sh"]
    ports:
      - "5433:5432"
    volumes:
      - postgres_secondary_data:/var/lib/postgresql/data
      - ./docker/postgres-secondary/entrypoint.sh:/entrypoint.sh
      - ./docker/postgres-secondary/setup.sh:/secondary-setup.sh
    depends_on:
      db-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  db-secondary-2:
    image: postgres:17-alpine
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: db-primary
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
    entrypoint: ["bash", "/entrypoint.sh"]
    ports:
      - "5434:5432"
    volumes:
      - postgres_secondary_2_data:/var/lib/postgresql/data
      - ./docker/postgres-secondary/entrypoint.sh:/entrypoint.sh
      - ./docker/postgres-secondary/setup.sh:/secondary-setup.sh
    depends_on:
      db-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  db-read-lb:
    image: haproxy:3.0-alpine
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5435:5432"
      - "8404:8404"
    depends_on:
      db-secondary:
        condition: service_healthy
      db-secondary-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-1:
    image: minio/minio:latest
    command: server http://minio-1/data1 http://minio-1/data2 http://minio-2/data1 http://minio-2/data2 --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_1_data1:/data1
      - minio_1_data2:/data2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  minio-2:
    image: minio/minio:latest
    command: server http://minio-1/data1 http://minio-1/data2 http://minio-2/data1 http://minio-2/data2 --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_2_data1:/data1
      - minio_2_data2:/data2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped

  minio-lb:
    image: nginx:alpine
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./docker/nginx/minio-lb.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      minio-1:
        condition: service_healthy
      minio-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:latest
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/ground-zero.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@db-primary:5432/groundzero?sslmode=disable"
    depends_on:
      db-primary:
        condition: service_healthy
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    environment:
      REDIS_ADDR: "redis://redis-lb:6379"
    depends_on:
      redis-lb:
        condition: service_healthy
    restart: unless-stopped

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - '--nginx.scrape-uri=http://app-lb:8080/nginx-status'
    depends_on:
      app-lb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_primary_data:
  postgres_secondary_data:
  postgres_secondary_2_data:
  minio_1_data1:
  minio_1_data2:
  minio_2_data1:
  minio_2_data2:
  redis_primary_data:
  redis_replica_data:
  prometheus_data:
  grafana_data:
