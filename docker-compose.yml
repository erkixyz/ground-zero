services:
  app-lb:
    image: nginx:alpine
    ports:
      - "3000:3000"
      - "3001:3001"
      - "8080:8080"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      web-2:
        condition: service_healthy
      api:
        condition: service_healthy
      api-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:8080/nginx-status || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
    environment:
      - NODE_ENV=production
      - API_URL=http://api:3001
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  web-2:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:3001
    environment:
      - NODE_ENV=production
      - API_URL=http://api:3001
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db-primary:5432/groundzero
      - DATABASE_REPLICA_URL=postgresql://postgres:postgres@db-read-lb:5432/groundzero
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PUBLIC_URL=http://localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=ground-zero
      - REDIS_URL=redis://redis-lb:6379
      - SESSION_SECRET=change-me-in-production
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      db-primary:
        condition: service_healthy
      db-read-lb:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-lb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/hello || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api-2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db-primary:5432/groundzero
      - DATABASE_REPLICA_URL=postgresql://postgres:postgres@db-read-lb:5432/groundzero
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_PUBLIC_URL=http://localhost:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=ground-zero
      - REDIS_URL=redis://redis-lb:6379
      - SESSION_SECRET=change-me-in-production
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      db-primary:
        condition: service_healthy
      db-read-lb:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis-lb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/hello || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis-primary:
    image: redis:7-alpine
    volumes:
      - redis_primary_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis-replica:
    image: redis:7-alpine
    command: redis-server --replicaof redis-primary 6379
    volumes:
      - redis_replica_data:/data
    depends_on:
      redis-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis-sentinel-1:
    image: redis:7-alpine
    volumes:
      - ./docker/redis-sentinel/sentinel.conf:/etc/sentinel-template.conf:ro
      - ./docker/redis-sentinel/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["sh", "/entrypoint.sh"]
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    restart: unless-stopped

  redis-sentinel-2:
    image: redis:7-alpine
    volumes:
      - ./docker/redis-sentinel/sentinel.conf:/etc/sentinel-template.conf:ro
      - ./docker/redis-sentinel/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["sh", "/entrypoint.sh"]
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    restart: unless-stopped

  redis-sentinel-3:
    image: redis:7-alpine
    volumes:
      - ./docker/redis-sentinel/sentinel.conf:/etc/sentinel-template.conf:ro
      - ./docker/redis-sentinel/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["sh", "/entrypoint.sh"]
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
    restart: unless-stopped

  redis-lb:
    image: haproxy:3.0-alpine
    ports:
      - "6379:6379"
      - "8405:8405"
    volumes:
      - ./docker/haproxy-redis/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      redis-primary:
        condition: service_healthy
      redis-replica:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_started
      redis-sentinel-2:
        condition: service_started
      redis-sentinel-3:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 6379"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  db-primary:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: groundzero
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=5
      -c wal_keep_size=64MB
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./docker/postgres-primary/init.sh:/docker-entrypoint-initdb.d/init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db-secondary:
    image: postgres:17-alpine
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: db-primary
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
    entrypoint: ["bash", "/entrypoint.sh"]
    ports:
      - "5433:5432"
    volumes:
      - postgres_secondary_data:/var/lib/postgresql/data
      - ./docker/postgres-secondary/entrypoint.sh:/entrypoint.sh
      - ./docker/postgres-secondary/setup.sh:/secondary-setup.sh
    depends_on:
      db-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  db-secondary-2:
    image: postgres:17-alpine
    environment:
      PGDATA: /var/lib/postgresql/data
      PRIMARY_HOST: db-primary
      PRIMARY_PORT: 5432
      REPLICATION_USER: replicator
      REPLICATION_PASSWORD: replicator_password
    entrypoint: ["bash", "/entrypoint.sh"]
    ports:
      - "5434:5432"
    volumes:
      - postgres_secondary_2_data:/var/lib/postgresql/data
      - ./docker/postgres-secondary/entrypoint.sh:/entrypoint.sh
      - ./docker/postgres-secondary/setup.sh:/secondary-setup.sh
    depends_on:
      db-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  db-read-lb:
    image: haproxy:3.0-alpine
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "5435:5432"
      - "8404:8404"
    depends_on:
      db-secondary:
        condition: service_healthy
      db-secondary-2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_primary_data:
  postgres_secondary_data:
  postgres_secondary_2_data:
  minio_data:
  redis_primary_data:
  redis_replica_data:
