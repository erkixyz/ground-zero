services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - api_node_modules:/app/node_modules

volumes:
  web_node_modules:
  web_next:
  api_node_modules:
