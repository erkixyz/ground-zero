services:
  db-primary:
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c wal_keep_size=64MB
      -c log_statement=all
      -c log_line_prefix='[primary] '

  db-secondary:
    command: >
      postgres
      -c log_statement=all
      -c log_line_prefix='[secondary-1] '

  db-secondary-2:
    command: >
      postgres
      -c log_statement=all
      -c log_line_prefix='[secondary-2] '

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - web_next:/app/.next

  web-2:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - web_2_node_modules:/app/node_modules
      - web_2_next:/app/.next

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - api_node_modules:/app/node_modules

  api-2:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend:/app
      - api_2_node_modules:/app/node_modules

volumes:
  web_node_modules:
  web_next:
  web_2_node_modules:
  web_2_next:
  api_node_modules:
  api_2_node_modules:
